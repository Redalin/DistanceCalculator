<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Pole -->
  <line x1="16" y1="22" x2="16" y2="32" stroke="black" stroke-width="2"/>
  <!-- Sign -->
  <rect x="8" y="8" width="16" height="14" fill="yellow" stroke="black" stroke-width="1" transform="rotate(45 16 15)"/>
  <!-- Curved arrow -->
  <path d="M 12 15 Q 16 11 20 15" stroke="black" fill="none" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black"/>
    </marker>
  </defs>
</svg>