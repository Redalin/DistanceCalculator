name: Build Docker Image

on:
  pull_request:
    branches: [ "main" ]
  
permissions:
  contents: read
  packages: write

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag meeting-distance-calculator:$(date +%s)